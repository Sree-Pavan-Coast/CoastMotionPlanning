# ==============================================================================
# Robot Definitions
# Each robot entry defines the physical geometry and kinematic parameters
# used by the planner, collision checker, and motion primitive generator.
#
# Supported types:
#   - "Car"          → Ackermann-steered single-body vehicle
#   - "TruckTrailer" → Articulated tractor + single trailer with hitch joint
# ==============================================================================

robots:

  # --------------------------------------------------------------------------
  # Car-type robots (single rigid body, Ackermann steering)
  # --------------------------------------------------------------------------

  - name: "Pro_XD"
    type: "Car"
    geometry:
      width_m: 1.62                   # overall body width
      wheelbase_m: 2.972               # front axle to rear axle
      front_overhang_m: 0.45          # front axle to front bumper
      rear_overhang_m: 0.65           # rear axle to rear bumper
    kinematics:
      max_steer_angle_deg: 34.0
      max_speed_mps: 6.0
      max_reverse_speed_mps: 1.0

  - name: "E_Transit"
    type: "Car"
    geometry:
      width_m: 2.23
      wheelbase_m: 3.76
      front_overhang_m: 1.1
      rear_overhang_m: 1.55
    kinematics:
      max_steer_angle_deg: 28.0
      max_speed_mps: 6.0
      max_reverse_speed_mps: 1.0

  - name: "Dolly"
    type: "Car"
    geometry:
      width_m: 3.022
      wheelbase_m: 3.37
      front_overhang_m: 0.55
      rear_overhang_m: 1.012
    kinematics:
      max_steer_angle_deg: 45.0
      max_speed_mps: 3.0
      max_reverse_speed_mps: 1.0

  # --------------------------------------------------------------------------
  # Truck-trailer robots (tractor + single articulated trailer)
  # --------------------------------------------------------------------------

  - name: "Yard Truck with Flatbed"
    type: "TruckTrailer"
    tractor:
      width_m: 2.0
      wheelbase_m: 3.5              # front axle to rear axle
      front_overhang_m: 1.0
      rear_overhang_m: 0.5
      hitch_offset_m: 0.8           # rear axle backward to hitch pin
    trailer:
      width_m: 2.4
      wheelbase_m: 5.0              # hitch pin to trailer axle
      front_overhang_m: 0.0         # trailer front face at hitch
      rear_overhang_m: 1.2          # trailer axle to rear bumper
    kinematics:
      max_steer_angle_deg: 26.0
      max_hitch_angle_deg: 60.0      # max jackknife limit
      max_speed_mps: 5.0
      max_reverse_speed_mps: 2.0
