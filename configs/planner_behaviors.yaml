# ==============================================================================
# Planner Behaviors
# Each behavior is a profile/variant of the master_params.yaml settings.
# Each profile must repeat the full master_params.yaml schema.
# ==============================================================================
#
# Available Costmap Layers (for active_layers list):
# ──────────────────────────────────────────────────
#   static_obstacles         — Binary free/lethal from search boundary
#   inflation                — BFS wavefront gradient from lethal cells
#   zone_constraints         — Zone index per cell (planner queries zone for behavior)
#   lane_centerline_cost     — Distance-to-centerline cost in track road zones
#   holonomic_with_obstacles — 2D Dijkstra from goal (admissible heuristic)
#   combined_cost            — Merged layer: max(static, zone_lethal) + inflation + lane
#
# Note: The planner consults active_layers when applying cost terms.
#       The builder still constructs its standard layers unconditionally.

global:
  debug_mode: false

behaviors:
  # The strict, optimal primary planner profile
  primary_profile:
    planner:
      max_planning_time_ms: 2000
      xy_grid_resolution_m: 0.1
      yaw_grid_resolution_deg: 5.0
      step_size_m: 0.5
      only_forward_path: false
      weight_forward: 1.0
      weight_reverse: 2.5
      weight_steer: 0.5
      weight_steer_change: 1.5
      weight_gear_change: 4.0
      analytic_expansion_max_length_m: 20.0
      analytic_expansion_ratio: 0.35
      min_path_len_in_same_motion: 3.0
      analytic_shot: true
      near_goal_analytic_expansion: true
      near_goal_analytic_radius_m: 3.0
      weight_lane_centerline: 1.0
      lane_heading_bias_weight: 0.0
      max_cross_track_error_m: 0.0
      lane_primitive_suppression: false
    costmap:
      resolution_m: 0.1
      inflation_radius_m: 0.3
      inscribed_radius_m: 1.0
      cost_scaling_factor: 3.0
      alpha_shape_alpha: 0.0
      max_lane_cost: 100.0
      max_lane_half_width_m: 5.0
    collision_checker:
      collision_mode: "strict"
      lethal_threshold: 254.0
      margin_m: 0.0
    motion_primitives:
      num_angle_bins: 72
    non_holonomic_heuristic:
      lut_grid_size: 400
      lut_cell_size_m: 0.1
      hitch_angle_penalty_factor: 2.0
    active_layers:
      - static_obstacles
      - inflation
      - zone_constraints
      - lane_centerline_cost
      - holonomic_with_obstacles
      - combined_cost

  # The relaxed fallback profile — less strict boundaries, faster planning
  relaxed_profile:
    planner:
      max_planning_time_ms: 3000
      xy_grid_resolution_m: 0.1
      yaw_grid_resolution_deg: 5.0
      step_size_m: 1.0
      only_forward_path: false
      weight_forward: 1.0
      weight_reverse: 1.0
      weight_steer: 0.5
      weight_steer_change: 1.5
      weight_gear_change: 2.0
      analytic_expansion_max_length_m: 20.0
      analytic_expansion_ratio: 0.35
      min_path_len_in_same_motion: 1.5
      analytic_shot: true
      near_goal_analytic_expansion: false
      near_goal_analytic_radius_m: 0.0
      weight_lane_centerline: 1.0
      lane_heading_bias_weight: 0.0
      max_cross_track_error_m: 0.0
      lane_primitive_suppression: false
    costmap:
      resolution_m: 0.1
      inflation_radius_m: 0.0
      inscribed_radius_m: 1.0
      cost_scaling_factor: 3.0
      alpha_shape_alpha: 0.0
      max_lane_cost: 100.0
      max_lane_half_width_m: 5.0
    collision_checker:
      collision_mode: "relaxed"
      lethal_threshold: 254.0
      margin_m: 0.0
    motion_primitives:
      num_angle_bins: 72
    non_holonomic_heuristic:
      lut_grid_size: 400
      lut_cell_size_m: 0.1
      hitch_angle_penalty_factor: 2.0
    active_layers:
      - static_obstacles
      - zone_constraints
      - holonomic_with_obstacles
      - combined_cost

  # Transition profile for maneuvering-zone to track-road handoff.
  maneuver_to_track_profile:
