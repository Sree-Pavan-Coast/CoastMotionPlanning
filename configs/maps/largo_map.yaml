# coordinate_type options:
# - "world": points are [x, y]
# - "lat_long": points are [latitude, longitude]
# - "long_lat": points are [longitude, latitude]
# planner_behavior may reference a behavior name from configs/planner_behaviors.yaml
# or use "default" / omit the field to use the built-in default for the zone type
maps:
  name: "Largo Map"
  
zones:
  - name: "largo_maneuvering_dock"
    type: "ManeuveringZone"
    planner_behavior: "primary_profile"
    coordinate_type: "world"
    polygon:
      - [-5.0, -5.0]
      - [15.0, -5.0]
      - [15.0, 20.0]
      - [-5.0, 20.0]

  - name: "largo_main_road_entry"
    type: "TrackMainRoad"
    planner_behavior: "primary_profile"
    coordinate_type: "world"
    polygon:
      - [18.0, 0.0]
      - [100.0, 0.0]
      - [100.0, 5.0]
      - [18.0, 5.0]
    lanes:
      - lane_waypoints:
          - [20.0, 1.5]
          - [40.0, 1.5]
      - lane_waypoints:
          - [20.0, 3.5]
          - [40.0, 3.5]
