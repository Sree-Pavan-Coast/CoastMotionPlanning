# coordinate_type options:
# - "world": points are [x, y]
# - "lat_long": points are [latitude, longitude]
# - "long_lat": points are [longitude, latitude]
# TrackMainRoad lane data uses ordered authoring segments:
# - lane.segments list order defines centerline travel order
# - each segment has a constant offset and ordered center_waypoints
# - gaps between segments are stitched into one canonical centerline
# planner_behavior may reference a behavior name from configs/planner_behaviors.yaml
# or use "default" / omit the field to use the built-in default for the zone type
maps:
  name: "Largo Map"
  
zones:
  - name: "largo_maneuvering_dock"
    type: "ManeuveringZone"
    planner_behavior: "primary_profile"
    coordinate_type: "world"
    polygon:
      - [-5.0, -5.0]
      - [15.0, -5.0]
      - [15.0, 20.0]
      - [-5.0, 20.0]

  - name: "largo_main_road_entry"
    type: "TrackMainRoad"
    planner_behavior: "track_main_road_profile"
    coordinate_type: "world"
    polygon:
      - [18.0, 0.0]
      - [100.0, 0.0]
      - [100.0, 5.0]
      - [18.0, 5.0]
    lane:
      segments:
        - id: largo_entry_center
          offset: 1.0
          center_waypoints:
            - [18.0, 2.5]
            - [100.0, 2.5]
