# ==============================================================================
# Master Parameters (Reference)
# This file serves as the baseline parameter definitions for all subsystems.
# Every behavior profile in planner_behaviors.yaml must repeat this full schema.
# ==============================================================================

# ---- Planner (Hybrid A*) ----
planner:
  max_planning_time_ms: 100
  xy_grid_resolution_m: 0.1
  yaw_grid_resolution_deg: 5.0
  step_size_m: 0.5
  only_forward_path: false
  weight_forward: 1.0
  weight_reverse: 2.0
  weight_steer: 0.5
  weight_steer_change: 1.5
  weight_gear_change: 2.0
  analytic_expansion_max_length_m: 20.0
  analytic_expansion_ratio: 0.35     # try analytic expansion every N nodes
  min_path_len_in_same_motion: 1.0   # contiguous forward/reverse run length before a gear flip
  analytic_shot: true                # enable/disable analytic expansion
  near_goal_analytic_expansion: false # allow analytic expansion when close to the goal
  near_goal_analytic_radius_m: 0.0    # distance threshold for near-goal analytic shots
  weight_lane_centerline: 1.0        # multiplier on lane_centerline_cost in edge computation
  lane_heading_bias_weight: 0.0      # cost per radian of deviation from lane heading
  max_cross_track_error_m: 0.0       # hard prune beyond this lane distance (0 = disabled)
  lane_primitive_suppression: false  # suppress non-forward primitives when aligned to a clear lane

# ---- Costmap ----
costmap:
  resolution_m: 0.1
  inflation_radius_m: 0.3
  inscribed_radius_m: 1.0            # robot half-width (auto-derived if 0)
  cost_scaling_factor: 3.0
  alpha_shape_alpha: 0.0             # 0 = auto (concave hull parameter)
  max_lane_cost: 100.0               # max cost at lane boundary
  max_lane_half_width_m: 5.0         # distance at which lane cost saturates

# ---- Collision Checker ----
collision_checker:
  collision_mode: "strict"           # "strict" | "relaxed"
  lethal_threshold: 254.0            # cost at or above this = collision
  margin_m: 0.0                      # extra safety margin around footprint

# ---- Motion Primitives ----
motion_primitives:
  num_angle_bins: 72                 # heading discretization (360/5 = 72)
  # Turning radius and steer angle now come from the selected robot at runtime.

# ---- Non-Holonomic Heuristic ----
non_holonomic_heuristic:
  lut_grid_size: 400
  lut_cell_size_m: 0.1
  hitch_angle_penalty_factor: 2.0    # truck-trailer hitch penalty weight
