      max_planning_time_ms: 3000
      xy_grid_resolution_m: 0.15
      yaw_grid_resolution_deg: 7.5
      step_size_m: 1.0
      only_forward_path: true
      weight_forward: 1.0
      weight_reverse: 1.0
      weight_steer: 0.15
      weight_steer_change: 0.4
      weight_gear_change: 1.0
      analytic_expansion_max_length_m: 30.0
      analytic_expansion_ratio: 0.5
      min_path_len_in_same_motion: 1.0
      analytic_shot: true
      near_goal_analytic_expansion: true
      near_goal_analytic_radius_m: 8.0
      weight_lane_centerline: 1.5
      lane_heading_bias_weight: 0.5
      max_cross_track_error_m: 0.0
      lane_primitive_suppression: false
    costmap:
      resolution_m: 0.1
      inflation_radius_m: 0.0
      inscribed_radius_m: 1.0
      cost_scaling_factor: 3.0
      alpha_shape_alpha: 0.0
      max_lane_cost: 100.0
      max_lane_half_width_m: 5.0
    collision_checker:
      collision_mode: "relaxed"
      lethal_threshold: 254.0
      margin_m: 0.0
    motion_primitives:
      num_angle_bins: 48
    non_holonomic_heuristic:
      lut_grid_size: 400
      lut_cell_size_m: 0.1
      hitch_angle_penalty_factor: 2.0
    active_layers:
